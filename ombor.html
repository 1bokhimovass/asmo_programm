<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASMO AVTO - Xomashyo Kirimi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="config.js"></script>
    <style>
      body {
        background-color: #f4f7f6;
        font-family: "Inter", sans-serif;
      }
      .card-custom {
        border-radius: 12px;
        border: none;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        background: white;
        margin-bottom: 20px;
      }
      .back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        background: white;
        color: #333;
        text-decoration: none;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        transition: all 0.2s ease;
        border: none;
        margin-right: 15px;
      }
      .calc-input {
        background-color: #eef2f7 !important;
        font-weight: bold;
        color: #2c3e50;
        border: 2px solid #dee2e6;
      }
      .calc-result {
        background-color: #fff9db !important;
        border: 2px solid #fab005 !important;
        font-weight: 800;
        color: #e67e22;
      }
      .section-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: #adb5bd;
        text-transform: uppercase;
        margin-bottom: 5px;
        display: block;
      }
      .inventory-card {
        border-radius: 10px;
        border-left: 5px solid #228be6;
        padding: 15px;
        background: white;
        height: 100%;
        transition: transform 0.2s;
      }
      .inventory-card:hover {
        transform: translateY(-5px);
      }
      #live-clock {
        font-size: 0.9rem;
        padding: 8px 12px;
        border-radius: 8px;
      }
      .edit-btn {
        padding: 4px 8px;
        font-size: 12px;
        border-radius: 6px;
      }
      .price-text {
        color: #2ecc71;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
          <a href="index.html" class="back-btn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              fill="currentColor"
              viewBox="0 0 16 16"
            >
              <path
                fill-rule="evenodd"
                d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"
              />
            </svg>
          </a>
          <h4 id="page-title" class="fw-bold m-0">Xomashyo Kirimi</h4>
        </div>
        <div id="live-clock" class="badge bg-dark"></div>
      </div>

      <span class="section-label">JORIY ZAXIRA (OMBORDA)</span>
      <div id="inventory-cards" class="row g-2 mb-4"></div>

      <div class="card card-custom p-4">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="section-label">Xomashyo Nomi</label>
            <div id="product-field-wrapper"></div>
            <div id="stock-hint" class="small fw-bold text-primary mt-1"></div>
          </div>

          <div class="col-md-3" id="led-price-section" style="display: none">
            <label class="section-label text-success">Narxi ($/so'm)</label>
            <input
              type="number"
              id="unit_price"
              class="form-control border-success fw-bold"
              placeholder="0.00"
            />
          </div>

          <div id="calculation-section" class="row g-3 mt-1"></div>

          <div class="row g-3 mt-1" id="results-section">
            <div class="col-md-4 kirim-detail" id="kuba-wrapper">
              <label class="section-label">kuba yig'indisi</label>
              <input
                type="text"
                id="kuba"
                class="form-control calc-result"
                readonly
              />
            </div>
            <div class="col-md-4 kirim-detail" id="kg-wrapper">
              <label class="section-label">kg yig'indisi</label>
              <input
                type="text"
                id="total_kg"
                class="form-control calc-result"
                readonly
              />
            </div>
            <div class="col-md-4">
              <label id="final-qty-label" class="section-label"
                >umumiy miqdor (dona)</label
              >
              <input
                type="text"
                id="final_qty"
                class="form-control calc-result"
                readonly
              />
            </div>
          </div>

          <div class="col-md-6">
            <label class="section-label">Mas'ul shaxs (Qabul qiluvchi)</label>
            <input
              type="text"
              id="responsible"
              class="form-control"
              placeholder="Ism kiriting..."
            />
          </div>
          <div class="col-md-6">
            <label class="section-label">Transport / Yetkazib beruvchi</label>
            <input
              type="text"
              id="transport"
              class="form-control"
              placeholder="Mashina yoki firma nomi..."
            />
          </div>

          <div class="col-12 mt-4">
            <button
              class="btn btn-primary w-100 fw-bold py-3 shadow"
              onclick="processTransaction()"
            >
              KIRIMNI TASDIQLASH
            </button>
          </div>
        </div>
      </div>

      <div class="card card-custom p-4">
        <span class="section-label mb-3">📜 SO'NGI KIRIMLAR TARIXI</span>
        <div class="table-responsive">
          <table class="table table-hover align-middle small text-center">
            <thead id="dynamic-head" class="table-light"></thead>
            <tbody id="dynamic-history-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const section = urlParams.get("type") || "LED";
      const DB_REC = "asmo_records_" + section.toLowerCase();
      const DB_BAL = "asmo_balance_" + section.toLowerCase();

      window.onload = function () {
        const title = document.getElementById("page-title");
        const wrapper = document.getElementById("product-field-wrapper");
        const displayNames = {
          LED: "LED PCB",
          GORE_TEX: "Gore-Tex Patch",
          SWITCH: "Switch Pedal",
        };
        title.innerText = "Kirim: " + (displayNames[section] || section);

        if (section === "LED") {
          wrapper.innerHTML = `<select id="product" class="form-select fw-bold border-primary" onchange="handleProductChange()"><option value="LED">LED</option><option value="PAYKA QALAY">PAYKA QALAY</option><option value="KILYONKA">KILYONKA</option></select>`;
        } else if (section === "GORE_TEX") {
          wrapper.innerHTML = `<select id="gt_type" class="form-select fw-bold border-primary" onchange="handleProductChange()"><option value="MEMBRANE">MEMBRANE</option><option value="SKOSH">SKOSH</option><option value="PLONKA">PLONKA</option></select>`;
        } else {
          wrapper.innerHTML = `<input type="text" id="product" class="form-control fw-bold border-primary" placeholder="Xomashyo nomi..." oninput="checkCurrentStock()" />`;
        }
        handleProductChange();
        listenToInventory();
        db.ref(DB_REC).on("value", refreshHistoryView);
      };

      function handleProductChange() {
        const calcSection = document.getElementById("calculation-section");
        const resSection = document.getElementById("results-section");
        const priceSection = document.getElementById("led-price-section");
        const kubaWrap = document.getElementById("kuba-wrapper");
        const kgWrap = document.getElementById("kg-wrapper");
        const qtyLabel = document.getElementById("final-qty-label");

        calcSection.innerHTML = "";
        resSection.style.display = "flex";
        kubaWrap.style.display = "block";
        kgWrap.style.display = "block";
        qtyLabel.innerText = "umumiy miqdor (dona)";

        if (section === "LED") {
          priceSection.style.display = "block";
          const product = document.getElementById("product").value;
          if (product === "PAYKA QALAY") {
            calcSection.innerHTML = `<div class="col-md-12"><label class="section-label text-primary">Kirim Miqdori (Gramm)</label><input type="number" id="payka_val" class="form-control calc-input" oninput="calculateSpecial()" placeholder="0"></div>`;
            kubaWrap.style.display = "none";
            kgWrap.style.display = "none";
            qtyLabel.innerText = "Jami (Gramm)";
          } else if (product === "KILYONKA") {
            calcSection.innerHTML = `<div class="col-md-12"><label class="section-label text-primary">Kirim Uzunligi (Metr)</label><input type="number" id="kilyonka_m" class="form-control calc-input" oninput="calculateSpecial()" placeholder="0.00"></div>`;
            kubaWrap.style.display = "none";
            kgWrap.style.display = "none";
            qtyLabel.innerText = "Jami (Metr)";
          } else {
            calcSection.innerHTML = `<div class="col-6 col-md-3"><label class="section-label">O'rin (Quti)</label><input type="number" id="urin" class="form-control calc-input" oninput="calculateExcel()"></div><div class="col-6 col-md-3"><label class="section-label">1 quti o'lchami</label><input type="text" id="box_size" class="form-control" oninput="calculateExcel()"></div><div class="col-6 col-md-3"><label class="section-label">1 quti KG</label><input type="number" id="box_kg" class="form-control" oninput="calculateExcel()"></div><div class="col-6 col-md-3"><label class="section-label">miqdori (dona)</label><input type="number" id="box_inner_qty" class="form-control" oninput="calculateExcel()"></div>`;
          }
        } else if (section === "GORE_TEX") {
          priceSection.style.display = "none";
          calcSection.innerHTML = `
            <div class="col-md-6"><label class="section-label text-primary">Eni (mm)</label><select id="gt_width" class="form-select fw-bold border-primary" onchange="calculateGoreTex()"><option value="80mm">80 mm</option><option value="100mm">100 mm</option><option value="120mm">120 mm</option><option value="147mm">147 mm</option></select></div>
            <div class="col-md-6"><label class="section-label text-primary">Metr (Uzunlik)</label><input type="number" id="gt_metr" class="form-control calc-input" oninput="calculateGoreTex()" placeholder="0.00"></div>`;
          kubaWrap.style.display = "none";
          kgWrap.style.display = "none";
          qtyLabel.innerText = "Hisoblangan Dona";
        } else {
          priceSection.style.display = "none";
          calcSection.innerHTML = `<div class="col-6 col-md-3"><label class="section-label">O'rin</label><input type="number" id="urin" class="form-control calc-input" oninput="calculateExcel()"></div><div class="col-6 col-md-3"><label class="section-label">O'lcham</label><input type="text" id="box_size" class="form-control" oninput="calculateExcel()"></div><div class="col-6 col-md-3"><label class="section-label">KG</label><input type="number" id="box_kg" class="form-control" oninput="calculateExcel()"></div><div class="col-6 col-md-3"><label class="section-label">Miqdor</label><input type="number" id="box_inner_qty" class="form-control" oninput="calculateExcel()"></div>`;
        }
        checkCurrentStock();
      }

      function calculateGoreTex() {
        const width = document.getElementById("gt_width").value;
        const metr = parseFloat(document.getElementById("gt_metr").value) || 0;
        let koeff = 420;
        if (width === "120mm") koeff = 282;
        if (width === "147mm") koeff = 115;
        document.getElementById("final_qty").value = (metr * koeff).toFixed(0);
        checkCurrentStock();
      }

      function calculateSpecial() {
        const p = document.getElementById("product").value;
        const f = document.getElementById("final_qty");
        if (p === "PAYKA QALAY")
          f.value = document.getElementById("payka_val").value || 0;
        if (p === "KILYONKA")
          f.value = document.getElementById("kilyonka_m").value || 0;
        checkCurrentStock();
      }

      function calculateExcel() {
        const u = parseFloat(document.getElementById("urin").value) || 0;
        const s = parseFloat(document.getElementById("box_size").value) || 0;
        const k = parseFloat(document.getElementById("box_kg").value) || 0;
        const i =
          parseFloat(document.getElementById("box_inner_qty").value) || 0;
        document.getElementById("kuba").value = (u * s).toFixed(3);
        document.getElementById("total_kg").value = (u * k).toFixed(2);
        document.getElementById("final_qty").value = u * i;
        checkCurrentStock();
      }

      function processTransaction() {
        const resp = document.getElementById("responsible").value;
        const trans = document.getElementById("transport").value;
        const price =
          section === "LED"
            ? document.getElementById("unit_price").value || 0
            : 0;
        let p = "",
          qty = parseFloat(document.getElementById("final_qty").value);

        if (section === "GORE_TEX") {
          p = (
            document.getElementById("gt_type").value +
            " " +
            document.getElementById("gt_width").value
          ).toUpperCase();
        } else {
          p = document.getElementById("product").value.toUpperCase();
        }

        if (!p || !qty || qty <= 0 || !resp)
          return alert("Ma'lumotlar to'liq emas!");

        db.ref(DB_BAL + "/" + p)
          .transaction((v) => (v || 0) + qty)
          .then(() => {
            db.ref(DB_REC).push({
              time: new Date().toLocaleString("uz-UZ"),
              type: "Xomashyo Kirim",
              product: p,
              qty: qty,
              price: price,
              kuba: document.getElementById("kuba")?.value || "-",
              kg: document.getElementById("total_kg")?.value || "-",
              responsible: resp,
              transport: trans,
            });
            alert("Kirim muvaffaqiyatli saqlandi!");
            location.reload();
          });
      }

      function refreshHistoryView() {
        const head = document.getElementById("dynamic-head");
        const body = document.getElementById("dynamic-history-body");
        let h = `<tr><th>Vaqt</th><th>Xomashyo</th>`;
        if (section === "LED") h += `<th>Narxi</th>`;
        h += `<th>Kuba/KG</th><th>Miqdor</th><th>Mas'ul</th><th>Amal</th></tr>`;
        head.innerHTML = h;

        db.ref(DB_REC)
          .limitToLast(15)
          .once("value", (snap) => {
            body.innerHTML = "";
            const data = snap.val();
            if (!data) return;
            Object.keys(data)
              .reverse()
              .forEach((key) => {
                const r = data[key];
                const t = r.time.split(",")[1] || r.time;
                let row = `<td>${t}</td><td>${r.product}</td>`;
                if (section === "LED")
                  row += `<td>${r.price && r.price != 0 ? r.price : "-"}</td>`;
                row += `<td>${r.kuba}/${r.kg}</td><td class="fw-bold text-success">+${r.qty}</td><td>${r.responsible}</td>`;
                row += `<td><button class="btn btn-outline-warning edit-btn" onclick="editDate('${key}', '${r.time}')">✎</button></td>`;
                body.innerHTML += `<tr>${row}</tr>`;
              });
          });
      }

      function checkCurrentStock() {
        let p = "";
        if (section === "GORE_TEX") {
          p = (
            document.getElementById("gt_type").value +
            " " +
            document.getElementById("gt_width").value
          ).toUpperCase();
        } else {
          const pElem = document.getElementById("product");
          p = pElem && pElem.value ? pElem.value.toUpperCase() : "";
        }
        if (!p) return;
        db.ref(DB_BAL + "/" + p).once("value", (snap) => {
          document.getElementById("stock-hint").innerText =
            "Omborda jami: " + (snap.val() || 0).toLocaleString();
        });
      }

      function listenToInventory() {
        db.ref(DB_BAL).on("value", (snap) => {
          const cont = document.getElementById("inventory-cards");
          cont.innerHTML = "";
          snap.forEach((c) => {
            cont.innerHTML += `<div class="col-6 col-md-3"><div class="inventory-card"><small class="section-label">${c.key}</small><h5 class="m-0 fw-bold text-primary">${c.val().toLocaleString()}</h5></div></div>`;
          });
        });
      }
      setInterval(() => {
        document.getElementById("live-clock").innerText =
          new Date().toLocaleTimeString();
      }, 1000);
      function editDate(k, o) {
        let n = prompt("Sana:", o);
        if (n)
          db.ref(DB_REC + "/" + k)
            .update({ time: n })
            .then(() => location.reload());
      }
    </script>
  </body>
</html>
